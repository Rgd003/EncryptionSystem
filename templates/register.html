{% extends "base.html" %}
{% block title %}Register · Encryption System{% endblock %}

{% block content %}
<div class="auth">
  <h1>Create Account</h1>
  <form class="card narrow" action="{{ url_for('register') }}" method="post">
    <label class="field-label">Username</label>
    <input type="text" name="username" placeholder="at least 3 characters" required>

    <label class="field-label">Password</label>
    <input type="password" name="password" placeholder="at least 6 characters" required>

    <label class="field-label">Confirm Password</label>
    <input type="password" name="confirm" placeholder="type the password again" required>

    <button type="submit" class="btn">Register</button>
    <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
  </form>
</div>
{% endblock %}
